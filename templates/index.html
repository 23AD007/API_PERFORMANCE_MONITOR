<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Performance Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">
        API Performance Monitor
    </h2>

    <div class="row">

        <div class="col-md-3">
            <div class="card text-bg-primary">
                <div class="card-body">
                    <h5>Total Requests</h5>
                    <h2 id="totalRequests">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-success">
                <div class="card-body">
                    <h5>Success</h5>
                    <h2 id="successful">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-danger">
                <div class="card-body">
                    <h5>Failed</h5>
                    <h2 id="failed">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-warning">
                <div class="card-body">
                    <h5>Availability</h5>
                    <h2 id="availability">0%</h2>
                </div>
            </div>
        </div>

    </div>

    <hr>

    <h4>Add API</h4>

    <form id="apiForm">

        <input class="form-control mb-2"
               id="name"
               placeholder="API Name">

        <input class="form-control mb-2"
               id="url"
               placeholder="API URL">

        <input class="form-control mb-2"
               id="method"
               value="GET">

        <input class="form-control mb-2"
               id="interval"
               type="number"
               value="30">

        <button class="btn btn-primary">
            Add API
        </button>

    </form>

    <hr>

    <h4>Registered APIs</h4>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>URL</th>
                <th>Method</th>
                <th>Interval</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody id="apiTable"></tbody>

    </table>
    <hr>

    <h4>Recent Monitoring</h4>

    <table class="table table-striped">

        <thead class="table-dark">

            <tr>

                <th>Time</th>
                <th>API</th>
                <th>Status</th>
                <th>Response</th>
                <th>Success</th>
                <th>Error</th>

            </tr>

        </thead>

        <tbody id="metricsTable"></tbody>

    </table>
    <hr>

<h3>Performance Analytics</h3>

<div class="row">

    <div class="col-md-8">

        <div class="card">

            <div class="card-header">
                Response Time Trend
            </div>

            <div class="card-body">

                <canvas id="responseChart"></canvas>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card">

            <div class="card-header">
                Success vs Failed
            </div>

            <div class="card-body">

                <canvas id="successChart"></canvas>

            </div>

        </div>

    </div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>


{# <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script> #}
</body>
</html>
